<!DOCTYPE html>
<html lang="en">
<head> <link rel="icon" type="image/png" href="/favicon.png">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>r&amp;r — today's thought</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@500;600&family=Special+Elite&display=swap');
  :root{
    --buttermilk:#f4ecd5; --beige:#e7d9ae; --evergreen:#1e3a2c; --evergreen-deep:#132922;
    --ink:#2a2a1e; --brass:#9c7a3e; --brass-light:#c9a968;
    --line: rgba(30,58,44,0.18); --paper-shadow: 0 1px 0 rgba(30,58,44,0.06), 0 10px 24px -14px rgba(20,30,20,0.3);
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--buttermilk); color:var(--ink); font-family:'Cormorant Garamond', serif; font-size:19px; line-height:1.65;}
  body::before{content:""; position:fixed; inset:0; pointer-events:none; z-index:2; opacity:0.5; mix-blend-mode:multiply;
    background-image:radial-gradient(rgba(30,58,44,0.035) 1px, transparent 1px); background-size:3px 3px;}
  a{color:inherit;}
  .eyebrow{font-family:'Special Elite', monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--brass);}
  header{background:var(--evergreen); color:var(--buttermilk); padding:22px clamp(20px,5vw,48px); display:flex; align-items:center; justify-content:space-between;}
  header .wordmark{font-family:'IM Fell English', serif; font-style:italic; font-size:20px;}
  .nav-links{display:flex; gap:20px;}
  header a.nav-link{font-family:'Special Elite', monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; color:var(--brass-light); border-bottom:1px solid var(--brass-light); padding-bottom:2px;}
  .hero{text-align:center; padding:72px 24px 56px; background:radial-gradient(120% 100% at 50% 0%, var(--evergreen) 0%, var(--evergreen-deep) 75%); color:var(--buttermilk);}
  .hero .eyebrow{color:var(--brass-light); display:block; margin-bottom:14px;}
  .hero h1{font-family:'IM Fell English', serif; font-style:italic; font-weight:400; font-size:clamp(28px,4.5vw,38px); margin:0 0 16px;}
  .hero p.prompt{font-family:'Cormorant Garamond', serif; font-style:italic; font-size:24px; color:var(--brass-light); margin:0; min-height:34px;}
  main{max-width:680px; margin:0 auto; padding:56px 24px 100px;}
  .cta-row{text-align:center; margin-bottom:48px;}
  .cta{display:inline-block; font-family:'Special Elite', monospace; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; color:var(--buttermilk); background:var(--evergreen); padding:12px 24px;}
  .cta:hover{background:var(--evergreen-deep);}
  .notes{display:flex; flex-direction:column; gap:22px;}
  .note{background:#faf3de; border:1px solid var(--line); box-shadow:var(--paper-shadow); padding:22px 26px;}
  .note p{margin:0 0 10px; font-size:18px;}
  .note-by{font-family:'Caveat', cursive; font-size:20px; color:var(--evergreen);}
  .empty-note{text-align:center; color:rgba(42,42,30,0.5); font-style:italic; font-size:16px; padding:20px 0;}

  .archive{margin-top:64px; padding-top:44px; border-top:1px dashed var(--line);}
  .archive-head{text-align:center; margin-bottom:28px;}
  .archive-head h2{font-family:'IM Fell English', serif; font-style:italic; font-weight:400; font-size:22px; color:var(--evergreen); margin:8px 0 0;}
  details.past-q{background:#faf3de; border:1px solid var(--line); box-shadow:var(--paper-shadow); margin-bottom:16px; padding:18px 22px;}
  details.past-q summary{
    cursor:pointer; font-family:'Cormorant Garamond', serif; font-style:italic; font-size:19px; color:var(--evergreen);
    list-style:none; display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  details.past-q summary::-webkit-details-marker{display:none;}
  details.past-q summary::after{content:"+"; font-family:'Special Elite', monospace; color:var(--brass); flex-shrink:0;}
  details.past-q[open] summary::after{content:"–";}
  details.past-q .notes{margin-top:18px;}
  details.past-q .note{background:var(--buttermilk); box-shadow:none; padding:16px 18px;}

  footer{background:var(--evergreen-deep); color:var(--buttermilk); text-align:center; padding:44px 24px;}
  footer .wordmark2{font-family:'IM Fell English', serif; font-style:italic; font-size:22px; display:block; margin-bottom:8px;}
  footer .root-reason{font-family:'Special Elite', monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass-light);}
</style>
</head>
<body>

<header>
  <span class="wordmark">r&amp;r</span>
  <div class="nav-links">
    <a class="nav-link" href="/">the cabinet</a>
    <a class="nav-link" href="about">about</a>
    <a class="nav-link" href="submit?type=today">add your answer</a>
  </div>
</header>

<section class="hero">
  <span class="eyebrow">today's thought</span>
  <h1>a question, left open</h1>
  <p class="prompt" id="currentQuestionText">loading today's question...</p>
</section>

<main>
  <div class="cta-row">
    <a class="cta" href="submit?type=today">leave your answer</a>
  </div>
  <div class="notes" id="notesList">
    <p class="empty-note">opening the jar...</p>
  </div>

  <div class="archive" id="archiveSection" style="display:none;">
    <div class="archive-head">
      <span class="eyebrow">the archive</span>
      <h2>earlier questions, kept as they were</h2>
    </div>
    <div id="archiveList"></div>
  </div>
</main>

<footer>
  <span class="wordmark2">r&amp;r</span>
  <div class="root-reason">root &amp; reason</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="rr-config.js"></script>
<script>
  const sb = window.supabase.createClient(window.RR_CONFIG.url, window.RR_CONFIG.key);
  const SEED_QUESTION = "what changed your life?";

  const foundingAnswers = [
    { by: 'Amara, Lagos', text: "a stranger on a train once told me my idea wasn't crazy. i was twenty-two and about to give up on it. i still think about that ten-minute conversation more than most years of my life." },
    { by: 'Noor, Beirut', text: "my grandmother's hands. watching her fold dough the same way for sixty years taught me that repetition isn't boring — it's how you get good at loving something." },
    { by: 'Tom, Bristol', text: "i quit a job i was praised for, to do one i was bad at. being a beginner again, at thirty-four, changed everything about how i see failure." }
  ];

  function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

  function renderNotes(list){
    if(!list.length) return '<p class="empty-note">no answers here yet.</p>';
    return `<div class="notes">${list.map(n => `
      <div class="note"><p>${escapeHtml(n.text)}</p><span class="note-by">— ${escapeHtml(n.by)}</span></div>
    `).join('')}</div>`;
  }

  async function init(){
    let questions = [];
    let entries = [];
    try{
      const qRes = await sb.from('questions').select('*').eq('context','today').eq('approved', true).order('created_at', { ascending: false });
      questions = qRes.data || [];
    }catch(err){ questions = []; }
    try{
      const eRes = await sb.from('entries').select('*').eq('type','today').eq('approved', true).order('created_at', { ascending: false });
      entries = eRes.data || [];
    }catch(err){ entries = []; }

    const answersFor = (questionId) => entries
      .filter(e => e.question_id === questionId)
      .map(e => ({ by: `${e.name || 'anonymous'}${e.place ? ', ' + e.place : ''}`, text: e.content }));

    const current = questions[0];
    const currentText = current ? current.text : SEED_QUESTION;
    document.getElementById('currentQuestionText').textContent = `"${currentText}"`;

    let currentAnswers = current ? answersFor(current.id) : [];
    // keep the founding examples attached to the shelf as long as the live question hasn't changed
    if(currentText.trim().toLowerCase() === SEED_QUESTION){
      currentAnswers = [...currentAnswers, ...foundingAnswers];
    }
    document.getElementById('notesList').innerHTML = renderNotes(currentAnswers);

    // archive: every older question, plus a fallback slot for the founding examples
    // if the live question has already moved on from the original one
    const pastQuestions = questions.slice(1);
    let archiveHtml = pastQuestions.map(q => {
      let ans = answersFor(q.id);
      if(q.text.trim().toLowerCase() === SEED_QUESTION){
        ans = [...ans, ...foundingAnswers];
      }
      return `
        <details class="past-q">
          <summary>"${escapeHtml(q.text)}"</summary>
          ${renderNotes(ans)}
        </details>
      `;
    }).join('');

    if(archiveHtml){
      document.getElementById('archiveSection').style.display = 'block';
      document.getElementById('archiveList').innerHTML = archiveHtml;
    }
  }
  init();
</script>

</body>
</html>
