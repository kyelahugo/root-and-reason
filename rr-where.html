<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>r&amp;r — where are you?</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Caveat:wght@500;600&family=Special+Elite&display=swap');
  :root{
    --buttermilk:#f4ecd5; --beige:#e7d9ae; --evergreen:#1e3a2c; --evergreen-deep:#132922;
    --ink:#2a2a1e; --brass:#9c7a3e; --brass-light:#c9a968;
    --line: rgba(30,58,44,0.18); --paper-shadow: 0 1px 0 rgba(30,58,44,0.06), 0 10px 24px -14px rgba(20,30,20,0.3);
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--buttermilk); color:var(--ink); font-family:'Cormorant Garamond', serif; font-size:19px; line-height:1.65;}
  body::before{content:""; position:fixed; inset:0; pointer-events:none; z-index:2; opacity:0.5; mix-blend-mode:multiply;
    background-image:radial-gradient(rgba(30,58,44,0.035) 1px, transparent 1px); background-size:3px 3px;}
  a{color:inherit;}
  .eyebrow{font-family:'Special Elite', monospace; font-size:11px; letter-spacing:0.16em; text-transform:uppercase; color:var(--brass);}
  header{background:var(--evergreen); color:var(--buttermilk); padding:22px clamp(20px,5vw,48px); display:flex; align-items:center; justify-content:space-between;}
  header .wordmark{font-family:'IM Fell English', serif; font-style:italic; font-size:20px;}
  .nav-links{display:flex; gap:20px;}
  header a.nav-link{font-family:'Special Elite', monospace; font-size:11px; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; color:var(--brass-light); border-bottom:1px solid var(--brass-light); padding-bottom:2px;}
  .hero{text-align:center; padding:72px 24px 56px; background:radial-gradient(120% 100% at 50% 0%, var(--evergreen) 0%, var(--evergreen-deep) 75%); color:var(--buttermilk);}
  .hero .eyebrow{color:var(--brass-light); display:block; margin-bottom:14px;}
  .hero h1{font-family:'IM Fell English', serif; font-style:italic; font-weight:400; font-size:clamp(28px,4.5vw,38px); margin:0 0 16px;}
  .hero p{max-width:46ch; margin:0 auto; color:rgba(244,236,213,0.8); font-size:16.5px;}
  main{max-width:820px; margin:0 auto; padding:56px 24px 100px;}
  .cta-row{text-align:center; margin-bottom:48px;}
  .cta{display:inline-block; font-family:'Special Elite', monospace; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; text-decoration:none; color:var(--buttermilk); background:var(--evergreen); padding:12px 24px;}
  .cta:hover{background:var(--evergreen-deep);}
  .postcards{display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px;}
  .postcard{background:#faf3de; border:1px solid var(--line); box-shadow:var(--paper-shadow); padding:22px;}
  .postcard .place{font-family:'Caveat', cursive; font-size:22px; color:var(--evergreen); display:block; margin-bottom:8px;}
  .postcard p{margin:0; font-size:17px; font-style:italic;}
  .empty-note{text-align:center; color:rgba(42,42,30,0.5); font-style:italic; font-size:16px; padding:20px 0; grid-column:1/-1;}
  footer{background:var(--evergreen-deep); color:var(--buttermilk); text-align:center; padding:44px 24px;}
  footer .wordmark2{font-family:'IM Fell English', serif; font-style:italic; font-size:22px; display:block; margin-bottom:8px;}
  footer .root-reason{font-family:'Special Elite', monospace; font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--brass-light);}
</style>
</head>
<body>

<header>
  <span class="wordmark">r&amp;r</span>
  <div class="nav-links">
    <a class="nav-link" href="/">the cabinet</a>
    <a class="nav-link" href="/">about</a>
    <a class="nav-link" href="/?type=postcard">share where you are</a>
  </div>
</header>

<section class="hero">
  <span class="eyebrow">where are you?</span>
  <h1>a small window into today</h1>
  <p>the weather, the light, the sound outside — from wherever you're reading this.</p>
</section>

<main>
  <div class="cta-row">
    <a class="cta" href="/?type=postcard">send a postcard</a>
  </div>
  <div class="postcards" id="postcardsList">
    <p class="empty-note">opening the jar...</p>
  </div>
</main>

<footer>
  <span class="wordmark2">r&amp;r</span>
  <div class="root-reason">root &amp; reason</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="rr-config.js"></script>
<script>
  const sb = window.supabase.createClient(window.RR_CONFIG.url, window.RR_CONFIG.key);

  const founding = [
    { place: 'Osaka, Japan', text: "it's raining today. everyone under the same grey sky, somehow, and it makes the world feel connected." },
    { place: 'Nairobi, Kenya', text: "the dust has finally settled after last night's rain. the air smells like it's been washed clean." },
    { place: 'Buenos Aires, Argentina', text: "the jacaranda trees are shedding purple onto the sidewalks. it looks like the city is blushing." }
  ];
  function escapeHtml(str){ const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

  async function loadApproved(){
    try{
      const { data, error } = await sb
        .from('entries')
        .select('*')
        .eq('type', 'postcard')
        .eq('approved', true)
        .order('created_at', { ascending: false });
      if(error || !data) return [];
      return data.map(e => ({ place: e.place || (e.name || 'somewhere'), text: e.content }));
    }catch(err){
      return [];
    }
  }

  async function init(){
    const submitted = await loadApproved();
    const all = [...submitted, ...founding];
    document.getElementById('postcardsList').innerHTML = all.map(n => `
      <div class="postcard"><span class="place">${escapeHtml(n.place)}</span><p>${escapeHtml(n.text)}</p></div>
    `).join('');
  }
  init();
</script>

</body>
</html>
